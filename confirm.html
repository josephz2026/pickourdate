<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Confirm Your Date</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; overflow-x: hidden; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #E8E0D5;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      touch-action: pan-y;
    }

    .card {
      background: #12121C;
      border-radius: 28px;
      padding: 48px 32px;
      max-width: 460px;
      width: 100%;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .glow {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(80,60,200,0.12) 0%, transparent 70%);
      top: -150px;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
    }

    .stars {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      border-radius: 28px;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      opacity: 0;
      animation: twinkle 3s infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 0.5; transform: scale(1.2); }
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(38px, 9vw, 52px);
      font-weight: 400;
      color: white;
      margin-bottom: 8px;
      position: relative;
      z-index: 1;
      line-height: 1.1;
    }

    .card-title em {
      font-style: italic;
      color: rgba(255,255,255,0.4);
    }

    .card-sub {
      font-size: 13px;
      color: rgba(255,255,255,0.25);
      font-weight: 300;
      margin-bottom: 36px;
      position: relative;
      z-index: 1;
    }

    .summary {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 8px 0;
      margin-bottom: 28px;
      text-align: left;
      position: relative;
      z-index: 1;
    }

    .summary-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .summary-row:last-child { border-bottom: none; }

    .summary-icon {
      font-size: 18px;
      width: 32px;
      text-align: center;
      flex-shrink: 0;
    }

    .summary-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.2);
      font-weight: 500;
      margin-bottom: 3px;
    }

    .summary-value {
      font-size: 15px;
      font-weight: 400;
      color: white;
      font-family: 'Playfair Display', serif;
    }

    .summary-tag {
      display: inline-block;
      font-size: 10px;
      padding: 2px 10px;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.4);
      margin-left: 8px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      vertical-align: middle;
    }

    .confirm-btn {
      width: 100%;
      padding: 17px;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.3);
      background: transparent;
      color: white;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }

    .confirm-btn:hover {
      border-color: rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.05);
      transform: translateY(-2px);
    }

    .confirm-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .back-btn {
      width: 100%;
      padding: 14px;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.08);
      background: transparent;
      color: rgba(255,255,255,0.25);
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.08em;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      z-index: 1;
    }

    .back-btn:hover {
      border-color: rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.5);
    }

    .card-footer {
      margin-top: 32px;
      font-size: 10px;
      color: rgba(255,255,255,0.1);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="glow"></div>
    <div class="stars">
      <div class="star" style="top:10%;left:8%;animation-delay:0s"></div>
      <div class="star" style="top:20%;left:90%;animation-delay:0.6s"></div>
      <div class="star" style="top:60%;left:5%;animation-delay:1.2s"></div>
      <div class="star" style="top:80%;left:85%;animation-delay:0.3s"></div>
      <div class="star" style="top:45%;left:95%;animation-delay:1.8s"></div>
      <div class="star" style="top:88%;left:40%;animation-delay:0.9s"></div>
    </div>

    <h1 class="card-title">Looks <em>good?</em></h1>
    <p class="card-sub">Here's what you picked — lock it in.</p>

    <div class="summary">
      <div class="summary-row">
        <div class="summary-icon">📍</div>
        <div>
          <div class="summary-label">Spot</div>
          <div class="summary-value" id="summary-venue">—</div>
        </div>
      </div>
      <div class="summary-row">
        <div class="summary-icon">📅</div>
        <div>
          <div class="summary-label">Date</div>
          <div class="summary-value" id="summary-date">—</div>
        </div>
      </div>
      <div class="summary-row">
        <div class="summary-icon">🕖</div>
        <div>
          <div class="summary-label">Time</div>
          <div class="summary-value" id="summary-time">—</div>
        </div>
      </div>
    </div>

    <button class="confirm-btn" id="confirm-btn" onclick="confirmDate()">
      Lock it in
    </button>
    <button class="back-btn" onclick="history.back()">
      Go back and change
    </button>

    <p class="card-footer">pickourdate.co</p>
  </div>

  <script src="supabase.js"></script>
  <script>
    const venue = JSON.parse(localStorage.getItem('venue') || '{}');
    const slot = JSON.parse(localStorage.getItem('slot') || '{}');
    const slug = localStorage.getItem('slug');

    if (venue.name) {
      document.getElementById('summary-venue').innerHTML =
        `${venue.name} <span class="summary-tag">${venue.tag}</span>`;
    }

    if (slot.date) {
      document.getElementById('summary-date').textContent = `${slot.day}, ${slot.date}`;
      document.getElementById('summary-time').textContent = slot.time;
    }

    async function confirmDate() {
      const btn = document.getElementById('confirm-btn');
      btn.disabled = true;
      btn.textContent = 'Confirming...';

      try {
        if (slug) {
          await updateDatePage(slug, {
            selected_venue: venue,
            selected_slot: slot,
            status: 'confirmed',
            confirmed_at: new Date().toISOString()
          });
        }
        window.location.href = 'datecard.html';
      } catch (err) {
        console.error(err);
        btn.disabled = false;
        btn.textContent = 'Lock it in';
        alert('Something went wrong. Please try again.');
      }
    }
  </script>
</body>
</html>
