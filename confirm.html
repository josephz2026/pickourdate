<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirm Your Date</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=DM+Sans:wght@400;500;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #0f1c3f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      position: relative;
    }

    .bg-glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(58,123,213,0.2) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 28px;
      padding: 44px 40px;
      max-width: 500px;
      width: 100%;
      text-align: center;
      position: relative;
    }

    .header h1 {
      font-family: 'Dancing Script', cursive;
      font-size: 48px;
      color: white;
      margin-bottom: 8px;
    }

    .header p {
      font-size: 15px;
      color: rgba(255,255,255,0.45);
      margin-bottom: 36px;
    }

    .summary {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 28px;
      text-align: left;
    }

    .summary-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .summary-row:last-child { border-bottom: none; }

    .summary-icon {
      font-size: 20px;
      width: 36px;
      text-align: center;
      flex-shrink: 0;
    }

    .summary-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.35);
      font-weight: 600;
      margin-bottom: 2px;
    }

    .summary-value {
      font-size: 16px;
      font-weight: 700;
      color: white;
    }

    .summary-tag {
      display: inline-block;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 50px;
      background: rgba(58,123,213,0.3);
      color: #7ab3f5;
      border: 1px solid rgba(91,156,246,0.3);
      margin-left: 8px;
      font-weight: 500;
    }

    .confirm-btn {
      width: 100%;
      padding: 18px;
      border-radius: 50px;
      border: none;
      background: #3a7bd5;
      color: white;
      font-size: 16px;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 12px;
    }

    .confirm-btn:hover {
      background: #2d66bb;
      transform: translateY(-2px);
    }

    .back-btn {
      width: 100%;
      padding: 14px;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.15);
      background: transparent;
      color: rgba(255,255,255,0.5);
      font-size: 14px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }

    .back-btn:hover {
      border-color: rgba(255,255,255,0.3);
      color: white;
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>

  <div class="card">
    <div class="header">
      <h1>Looks good?</h1>
      <p>Here's what you picked — lock it in.</p>
    </div>

    <div class="summary">
      <div class="summary-row">
        <div class="summary-icon">📍</div>
        <div>
          <div class="summary-label">Spot</div>
          <div class="summary-value">Amor Cubano <span class="summary-tag">Dinner</span></div>
        </div>
      </div>
      <div class="summary-row">
        <div class="summary-icon">📅</div>
        <div>
          <div class="summary-label">Date</div>
          <div class="summary-value">Saturday, June 7</div>
        </div>
      </div>
      <div class="summary-row">
        <div class="summary-icon">🕖</div>
        <div>
          <div class="summary-label">Time</div>
          <div class="summary-value">7:00 PM</div>
        </div>
      </div>
    </div>

    <button class="confirm-btn" onclick="window.location.href='datecard.html'">
      Lock it in ✓
    </button>
    <button class="back-btn" onclick="history.back()">
      Go back and change
    </button>
  </div>
  <script>
    const venue = JSON.parse(localStorage.getItem('venue') || '{}');
    const slot = JSON.parse(localStorage.getItem('slot') || '{}');

    if (venue.name) {
      document.querySelector('.summary-row:nth-child(1) .summary-value').innerHTML =
        `${venue.name} <span class="summary-tag">${venue.tag}</span>`;
    }
    if (slot.date) {
      document.querySelector('.summary-row:nth-child(2) .summary-value').textContent =
        `${slot.day}, ${slot.date}`;
      document.querySelector('.summary-row:nth-child(3) .summary-value').textContent =
        slot.time;
    }
  </script>
</body>
</html>
