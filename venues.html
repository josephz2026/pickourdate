<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pick a Spot</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; overflow-x: hidden; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #E8E0D5;
      min-height: 100vh;
      padding: 40px 20px 60px;
      touch-action: pan-y;
    }

    .header {
      text-align: center;
      margin-bottom: 36px;
    }

    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(36px, 9vw, 52px);
      font-weight: 400;
      color: #12121C;
      margin-bottom: 10px;
      line-height: 1.1;
    }

    .header h1 em {
      font-style: italic;
      color: rgba(18,18,28,0.4);
    }

    .header p {
      font-size: 15px;
      color: rgba(18,18,28,0.5);
      font-weight: 400;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-width: 500px;
      margin: 0 auto;
    }

    .venue-card {
      background: #12121C;
      border-radius: 24px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.25s;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .venue-card:hover {
      transform: translateY(-3px);
      border-color: rgba(255,255,255,0.2);
    }

    .venue-card.selected {
      border-color: rgba(255,255,255,0.5);
    }

    .venue-img {
      width: 100%;
      height: 180px;
      background-size: cover;
      background-position: center;
      position: relative;
    }

    .venue-img-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 40%, rgba(18,18,28,0.8) 100%);
    }

    .venue-img-tag {
      position: absolute;
      top: 14px;
      right: 14px;
      font-size: 11px;
      padding: 5px 14px;
      border-radius: 50px;
      background: rgba(18,18,28,0.7);
      color: rgba(255,255,255,0.8);
      border: 1px solid rgba(255,255,255,0.2);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      backdrop-filter: blur(8px);
    }

    .venue-body { padding: 20px; }

    .venue-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 8px;
      gap: 10px;
    }

    a.venue-name {
      font-size: 18px;
      font-weight: 500;
      color: white;
      text-decoration: none;
      transition: opacity 0.15s;
      font-family: 'Playfair Display', serif;
    }

    a.venue-name:hover { opacity: 0.7; }

    .venue-stars {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 6px;
    }

    .star-filled { color: #e8b84b; }

    .venue-address {
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      margin-bottom: 14px;
      font-weight: 400;
    }

    .venue-link {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      transition: color 0.2s;
    }

    .venue-link:hover { color: white; }

    .select-btn {
      margin-top: 14px;
      width: 100%;
      padding: 14px;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.2);
      background: transparent;
      color: rgba(255,255,255,0.7);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }

    .select-btn:hover {
      border-color: rgba(255,255,255,0.5);
      color: white;
    }

    .venue-card.selected .select-btn {
      border-color: rgba(255,255,255,0.6);
      color: white;
      background: rgba(255,255,255,0.08);
    }

    .continue-wrap {
      max-width: 500px;
      margin: 20px auto 0;
    }

    .continue-btn {
      width: 100%;
      padding: 18px;
      border-radius: 50px;
      border: 1px solid rgba(18,18,28,0.25);
      background: #12121C;
      color: rgba(255,255,255,0.35);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      opacity: 0.5;
      pointer-events: none;
    }

    .continue-btn.active {
      opacity: 1;
      pointer-events: all;
      color: white;
    }

    .continue-btn.active:hover {
      background: #1e1e2e;
      transform: translateY(-2px);
    }

    .loading {
      text-align: center;
      color: rgba(18,18,28,0.4);
      font-size: 15px;
      padding: 60px 0;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1 id="header-title">Pick a <em>spot.</em></h1>
    <p>A few ideas — you choose.</p>
  </div>

  <div class="cards" id="cards">
    <div class="loading">Loading...</div>
  </div>

  <div class="continue-wrap">
    <button class="continue-btn" id="continue-btn" onclick="goNext()">
      Next — pick a time
    </button>
  </div>

  <script src="supabase.js"></script>
  <script>
    let selected = null;
    let venues = [];
    let guestName = '';

    const photos = {
      'dinner': 'https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=800&q=80&auto=format&fit=crop',
      'drinks': 'https://images.unsplash.com/photo-1566417713940-fe7c737a9ef2?w=800&q=80&auto=format&fit=crop',
      'rooftop': 'https://images.unsplash.com/photo-1556911899-5df3026220fe?w=800&q=80&auto=format&fit=crop',
      'coffee': 'https://images.unsplash.com/photo-1542338332-76971ae8c292?w=800&q=80&auto=format&fit=crop',
      'park': 'https://images.unsplash.com/photo-1585938389612-a552a28d6914?w=800&q=80&auto=format&fit=crop',
      'concert': 'https://images.unsplash.com/photo-1459749411175-04bf5292ceea?w=800&q=80&auto=format&fit=crop',
      'activity': 'https://images.unsplash.com/photo-1467139701929-18c0d27a7516?w=800&q=80&auto=format&fit=crop',
      'lunch': 'https://images.unsplash.com/photo-1594046243098-0fceea9d451e?w=800&q=80&auto=format&fit=crop',
      'breakfast': 'https://images.unsplash.com/photo-1535567465397-7523840f2ae9?w=800&q=80&auto=format&fit=crop',
      'default': 'https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=800&q=80&auto=format&fit=crop'
      
    };

    function getPhoto(tag) {
      return photos[tag.toLowerCase()] || photos['default'];
    }

    function renderStars(rating) {
      let stars = '';
      for (let i = 1; i <= 5; i++) {
        stars += `<span class="${i <= Math.round(rating) ? 'star-filled' : ''}" style="${i > Math.round(rating) ? 'color:rgba(255,255,255,0.15)' : ''}">★</span>`;
      }
      return stars;
    }

    function renderVenues(venueList) {
      const container = document.getElementById('cards');
      container.innerHTML = '';
      venueList.forEach((venue, index) => {
        const n = index + 1;
        container.innerHTML += `
          <div class="venue-card" id="card${n}" onclick="selectVenue(${n})">
            <div class="venue-img" style="background-image:url('${getPhoto(venue.tag)}')">
              <div class="venue-img-overlay"></div>
              <div class="venue-img-tag">${venue.tag}</div>
            </div>
            <div class="venue-body">
              <div class="venue-top">
                <a href="${venue.maps}" target="_blank" class="venue-name" onclick="event.stopPropagation()">${venue.name}</a>
              </div>
              <div class="venue-stars">
                ${renderStars(venue.rating)}
                <span style="margin-left:4px">${venue.rating} · ${venue.reviews} reviews</span>
              </div>
              <div class="venue-address">${venue.address}</div>
              <a class="venue-link" href="${venue.maps}" target="_blank" onclick="event.stopPropagation()">Open in Google Maps ↗</a>
              <button class="select-btn" id="btn${n}">Choose this spot</button>
            </div>
          </div>
        `;
      });
    }

    async function loadPage() {
      const slug = localStorage.getItem('slug');
      if (!slug) {
        renderVenues([
          { name: 'Amor Cubano', tag: 'Dinner', rating: 4.8, reviews: '1,240', address: '140 E 46th St, New York, NY', maps: 'https://maps.google.com' },
          { name: '230 Fifth Rooftop', tag: 'Rooftop', rating: 4.3, reviews: '890', address: '230 Fifth Ave, New York, NY', maps: 'https://maps.google.com' },
          { name: 'Blank Street Coffee', tag: 'Coffee', rating: 4.4, reviews: '560', address: 'Multiple locations, New York, NY', maps: 'https://maps.google.com' }
        ]);
        return;
      }

      try {
        const page = await getDatePage(slug);
        if (!page) return;
        guestName = page.guest_name;
        document.getElementById('header-title').innerHTML = `Pick a <em>spot,</em> ${guestName}.`;
        venues = page.venues;
        renderVenues(venues);
      } catch (err) {
        console.error(err);
      }
    }

    function selectVenue(n) {
      if (selected) {
        document.getElementById('card' + selected).classList.remove('selected');
        document.getElementById('btn' + selected).textContent = 'Choose this spot';
      }
      selected = n;
      document.getElementById('card' + n).classList.add('selected');
      document.getElementById('btn' + n).textContent = 'Selected ✓';
      document.getElementById('continue-btn').classList.add('active');
      localStorage.setItem('venue', JSON.stringify(venues[n - 1]));
    }

    function goNext() {
      const mode = localStorage.getItem('dateMode');
      if (mode === 'preset') {
        window.location.href = 'confirm.html';
      } else {
        window.location.href = 'timepicker.html';
      }
    }

    loadPage();
  </script>
</body>
</html>
