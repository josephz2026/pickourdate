<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pick a Time</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; overflow-x: hidden; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #E8E0D5;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 40px 20px 60px;
      touch-action: pan-y;
    }

    .header {
      text-align: center;
      margin-bottom: 36px;
    }

    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(36px, 9vw, 52px);
      font-weight: 400;
      color: #12121C;
      margin-bottom: 10px;
      line-height: 1.1;
    }

    .header h1 em {
      font-style: italic;
      color: rgba(18,18,28,0.4);
    }

    .header p {
      font-size: 15px;
      color: rgba(18,18,28,0.5);
      font-weight: 400;
    }

    .slots {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 500px;
      margin: 0 auto;
    }

    .slot {
      background: #12121C;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 22px 24px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }

    .slot:hover {
      border-color: rgba(255,255,255,0.25);
      transform: translateY(-2px);
    }

    .slot.selected {
      border-color: rgba(255,255,255,0.5);
    }

    .stars {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      border-radius: 20px;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      opacity: 0;
      animation: twinkle 3s infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 0.5; transform: scale(1.2); }
    }

    .slot-left {
      display: flex;
      flex-direction: column;
      gap: 4px;
      position: relative;
      z-index: 1;
    }

    .slot-day {
      font-size: 11px;
      font-weight: 500;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .slot-date {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      font-weight: 400;
      color: white;
    }

    .slot-time {
      font-size: 15px;
      color: rgba(255,255,255,0.65);
      font-weight: 400;
    }

    .slot-check {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: transparent;
      font-size: 14px;
      transition: all 0.2s;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }

    .slot.selected .slot-check {
      background: white;
      border-color: white;
      color: #12121C;
    }

    .continue-wrap {
      max-width: 500px;
      margin: 20px auto 0;
    }

    .continue-btn {
      width: 100%;
      padding: 18px;
      border-radius: 50px;
      border: 1px solid rgba(18,18,28,0.25);
      background: #12121C;
      color: rgba(255,255,255,0.35);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      opacity: 0.5;
      pointer-events: none;
    }

    .continue-btn.active {
      opacity: 1;
      pointer-events: all;
      color: white;
    }

    .continue-btn.active:hover {
      background: #1e1e2e;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>When works <em>for you?</em></h1>
    <p>Pick a time that suits you best.</p>
  </div>

  <div class="slots" id="slots"></div>

  <div class="continue-wrap">
    <button class="continue-btn" id="continue-btn" onclick="window.location.href='confirm.html'">
      Next — review & confirm
    </button>
  </div>

  <script src="supabase.js"></script>
  <script>
    let selected = null;
    let slots = [];

    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

    function makeStars() {
      const positions = [
        'top:15%;left:8%', 'top:20%;left:88%', 'top:70%;left:15%',
        'top:80%;left:80%', 'top:40%;left:95%', 'top:85%;left:50%'
      ];
      return positions.map((pos, i) =>
        `<div class="star" style="${pos};animation-delay:${i * 0.4}s"></div>`
      ).join('');
    }

    function renderSlots(slotList) {
      const container = document.getElementById('slots');
      container.innerHTML = '';
      slotList.forEach((slot, index) => {
        const n = index + 1;
        container.innerHTML += `
          <div class="slot" id="slot${n}" onclick="selectSlot(${n})">
            <div class="stars">${makeStars()}</div>
            <div class="slot-left">
              <span class="slot-day">${slot.day}</span>
              <span class="slot-date">${slot.date}</span>
              <span class="slot-time">${slot.time}</span>
            </div>
            <div class="slot-check" id="check${n}">✓</div>
          </div>
        `;
      });
      slots = slotList;
    }

    async function loadPage() {
      const slug = localStorage.getItem('slug');
      if (!slug) {
        renderSlots([
          { day: 'Sunday', date: 'June 7', time: '7:00 PM' },
          { day: 'Sunday', date: 'June 7', time: '9:00 PM' },
          { day: 'Monday', date: 'June 8', time: '6:00 PM' }
        ]);
        return;
      }
      try {
        const page = await getDatePage(slug);
        if (!page) return;
        renderSlots(page.time_slots);
      } catch (err) { console.error(err); }
    }

    function selectSlot(n) {
      if (selected) document.getElementById('slot' + selected).classList.remove('selected');
      selected = n;
      document.getElementById('slot' + n).classList.add('selected');
      document.getElementById('continue-btn').classList.add('active');
      localStorage.setItem('slot', JSON.stringify(slots[n - 1]));
    }

    loadPage();
  </script>
</body>
</html>
