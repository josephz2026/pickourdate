<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pick a Time</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=DM+Sans:wght@400;500;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { width: 100%; overflow-x: hidden; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #0f1c3f;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 40px 24px;
      position: relative;
      touch-action: pan-y;
    }

    .bg-glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(58,123,213,0.2) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header h1 {
      font-family: 'Dancing Script', cursive;
      font-size: 48px;
      color: white;
      margin-bottom: 8px;
    }

    .header p {
      font-size: 15px;
      color: rgba(255,255,255,0.45);
    }

    .slots {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 520px;
      margin: 0 auto;
    }

    .slot {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 20px 24px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .slot:hover {
      border-color: rgba(91,156,246,0.5);
      background: rgba(255,255,255,0.08);
      transform: translateY(-2px);
    }

    .slot.selected {
      border-color: #5b9cf6;
      background: rgba(58,123,213,0.15);
    }

    .slot-left { display: flex; flex-direction: column; gap: 4px; }

    .slot-day {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .slot-date {
      font-size: 20px;
      font-weight: 700;
      color: white;
    }

    .slot-time {
      font-size: 15px;
      color: rgba(255,255,255,0.6);
      font-weight: 500;
    }

    .slot-check {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: transparent;
      font-size: 14px;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .slot.selected .slot-check {
      background: #3a7bd5;
      border-color: #3a7bd5;
      color: white;
    }

    .continue-wrap {
      max-width: 520px;
      margin: 24px auto 0;
    }

    .continue-btn {
      width: 100%;
      padding: 18px;
      border-radius: 50px;
      border: none;
      background: #3a7bd5;
      color: white;
      font-size: 16px;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      opacity: 0.4;
      pointer-events: none;
    }

    .continue-btn.active {
      opacity: 1;
      pointer-events: all;
    }

    .continue-btn.active:hover {
      background: #2d66bb;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>

  <div class="header">
    <h1>When works for you?</h1>
    <p>Pick a time that suits you best.</p>
  </div>

  <div class="slots">

    <div class="slot" id="slot1" onclick="selectSlot(1)">
      <div class="slot-left">
        <span class="slot-day">Sunday</span>
        <span class="slot-date">June 7</span>
        <span class="slot-time">7:00 PM</span>
      </div>
      <div class="slot-check" id="check1">✓</div>
    </div>

    <div class="slot" id="slot2" onclick="selectSlot(2)">
      <div class="slot-left">
        <span class="slot-day">Sunday</span>
        <span class="slot-date">June 7</span>
        <span class="slot-time">9:00 PM</span>
      </div>
      <div class="slot-check" id="check2">✓</div>
    </div>

    <div class="slot" id="slot3" onclick="selectSlot(3)">
      <div class="slot-left">
        <span class="slot-day">Monday</span>
        <span class="slot-date">June 8</span>
        <span class="slot-time">6:00 PM</span>
      </div>
      <div class="slot-check" id="check3">✓</div>
    </div>

  </div>

  <div class="continue-wrap">
    <button class="continue-btn" id="continue-btn" onclick="window.location.href='confirm.html'">
      Next — review & confirm
    </button>
  </div>

  <script>
    let selected = null;

    function selectSlot(n) {
      if (selected) {
        document.getElementById('slot' + selected).classList.remove('selected');
      }
      selected = n;
      document.getElementById('slot' + n).classList.add('selected');
      document.getElementById('continue-btn').classList.add('active');

      const slots = {
        1: { day: 'Sunday', date: 'June 7', time: '7:00 PM' },
        2: { day: 'Sunday', date: 'June 7', time: '9:00 PM' },
        3: { day: 'Monday', date: 'June 8', time: '6:00 PM' }
      };
      localStorage.setItem('slot', JSON.stringify(slots[n]));
    }
  </script>
</body>
</html>
