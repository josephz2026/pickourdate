<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dashboard — PickOurDate</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; overflow-x: hidden; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #E8E0D5;
      min-height: 100vh;
      padding: 40px 20px 60px;
    }

    .header {
      max-width: 600px;
      margin: 0 auto 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 400;
      color: #12121C;
    }

    .header h1 em { font-style: italic; color: rgba(18,18,28,0.4); }

    .user-info { display: flex; align-items: center; gap: 10px; }
    .user-name { font-size: 13px; color: rgba(18,18,28,0.5); }

    .sign-out-btn {
      font-size: 12px;
      color: rgba(18,18,28,0.4);
      background: none;
      border: 1px solid rgba(18,18,28,0.2);
      border-radius: 50px;
      padding: 6px 14px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }

    .sign-out-btn:hover { border-color: rgba(18,18,28,0.4); color: #12121C; }

    .new-date-btn {
      display: block;
      max-width: 600px;
      margin: 0 auto 24px;
      padding: 18px;
      border-radius: 50px;
      border: none;
      background: #12121C;
      color: white;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      text-decoration: none;
    }

    .new-date-btn:hover { background: #1e1e2e; transform: translateY(-2px); }

    .pages-list {
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .date-card {
      background: #12121C;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      opacity: 0;
      animation: twinkle 3s infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0; }
      50% { opacity: 0.4; }
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 16px;
      position: relative;
      z-index: 1;
    }

    .guest-name {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 400;
      color: white;
    }

    .status-badge {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 50px;
      border: 1px solid;
    }

    .status-badge.pending { color: rgba(255,200,80,0.8); border-color: rgba(255,200,80,0.2); background: rgba(255,200,80,0.05); }
    .status-badge.confirmed { color: rgba(100,220,150,0.9); border-color: rgba(100,220,150,0.2); background: rgba(100,220,150,0.05); }

    .card-details {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
      position: relative;
      z-index: 1;
    }

    .detail-row {
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .detail-row strong { color: rgba(255,255,255,0.7); font-weight: 500; }

    .card-actions {
      display: flex;
      gap: 8px;
      position: relative;
      z-index: 1;
    }

    .card-btn {
      flex: 1;
      padding: 10px;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.15);
      background: transparent;
      color: rgba(255,255,255,0.6);
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }

    .card-btn:hover { border-color: rgba(255,255,255,0.35); color: white; }
    .card-btn.copied { border-color: rgba(100,220,150,0.4); color: rgba(100,220,150,0.8); }

    .empty-state { text-align: center; padding: 60px 20px; }

    .empty-state h2 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 400;
      color: #12121C;
      margin-bottom: 8px;
    }

    .empty-state p { font-size: 15px; color: rgba(18,18,28,0.4); margin-bottom: 32px; }

    .loading { text-align: center; padding: 60px 20px; color: rgba(18,18,28,0.4); font-size: 15px; }

    .login-card {
      background: #12121C;
      border-radius: 28px;
      padding: 52px 36px;
      max-width: 440px;
      margin: 80px auto 0;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .login-title {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      font-weight: 400;
      color: white;
      margin-bottom: 12px;
    }

    .login-title em { font-style: italic; color: rgba(255,255,255,0.4); }

    .login-sub {
      font-size: 15px;
      color: rgba(255,255,255,0.45);
      margin-bottom: 40px;
      font-weight: 300;
      line-height: 1.6;
    }

    .google-btn {
      width: 100%;
      padding: 16px;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.25);
      background: transparent;
      color: white;
      font-size: 14px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .google-btn:hover { border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.05); transform: translateY(-2px); }

    .skip-btn {
      margin-top: 16px;
      font-size: 13px;
      color: rgba(255,255,255,0.25);
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      display: block;
      width: 100%;
      text-align: center;
      padding: 8px;
    }

    .skip-btn:hover { color: rgba(255,255,255,0.5); }
  </style>
</head>
<body>

  <div id="loading-view">
    <div class="loading" style="margin-top:80px">Loading...</div>
  </div>

  <div id="login-view" style="display:none">
    <div class="login-card">
      <div class="star" style="top:10%;left:8%;animation-delay:0s"></div>
      <div class="star" style="top:20%;left:90%;animation-delay:0.7s"></div>
      <div class="star" style="top:70%;left:5%;animation-delay:1.3s"></div>
      <div class="star" style="top:85%;left:85%;animation-delay:0.4s"></div>
      <h1 class="login-title">Your <em>dates.</em></h1>
      <p class="login-sub">Sign in to see all your date pages, track responses, and create new ones.</p>
      <button class="google-btn" onclick="signInWithGoogle()">
        <svg width="18" height="18" viewBox="0 0 18 18">
          <path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/>
          <path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/>
          <path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07z"/>
          <path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3z"/>
        </svg>
        Continue with Google
      </button>
      <button class="skip-btn" onclick="window.location.href='creator.html'">
        Continue without signing in →
      </button>
    </div>
  </div>

  <div id="dashboard-view" style="display:none">
    <div class="header">
      <h1>Your <em>dates.</em></h1>
      <div class="user-info">
        <span class="user-name" id="user-name"></span>
        <button class="sign-out-btn" onclick="signOut()">Sign out</button>
      </div>
    </div>
    <a href="creator.html" class="new-date-btn">+ Create a new date plan</a>
    <div class="pages-list" id="pages-list">
      <div class="loading">Loading your dates...</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://jjzscluiudnpzrpfmfje.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpqenNjbHVpdWRucHpycGZtZmplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5OTU5MDYsImV4cCI6MjA5NTU3MTkwNn0.Gibxci4jo9k5a9khF-kF4SxEPCq57umNr4FUvZBLzh0';

    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        persistSession: true,
        storageKey: 'pickourdate-auth',
        storage: window.localStorage
      }
    });

    async function init() {
      try {
        const { data: { session } } = await db.auth.getSession();
        document.getElementById('loading-view').style.display = 'none';

        if (!session) {
          document.getElementById('login-view').style.display = 'block';
          return;
        }

        showDashboard(session);
      } catch (err) {
        console.error(err);
        document.getElementById('loading-view').style.display = 'none';
        document.getElementById('login-view').style.display = 'block';
      }
    }

    function showDashboard(session) {
      document.getElementById('login-view').style.display = 'none';
      document.getElementById('dashboard-view').style.display = 'block';
      document.getElementById('user-name').textContent = session.user.email;
      loadDates(session.user.id, session.access_token);
    }

    async function signInWithGoogle() {
      await db.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: 'https://pickourdate.co/dashboard' }
      });
    }

    async function signOut() {
      await db.auth.signOut();
      window.location.reload();
    }

    async function loadDates(userId, token) {
      try {
        const { data, error } = await db
          .from('date_pages')
          .select('*')
          .eq('user_id', userId)
          .order('created_at', { ascending: false });

        const container = document.getElementById('pages-list');

        if (error || !data || data.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <h2>No dates yet.</h2>
              <p>Create your first date plan and send it to someone special.</p>
              <a href="creator.html" class="new-date-btn" style="display:inline-block;max-width:300px;margin-top:16px">Create a date plan</a>
            </div>
          `;
          return;
        }

        container.innerHTML = data.map(page => {
          const venue = page.selected_venue || (page.venues && page.venues[0]) || {};
          const slot = page.selected_slot || (page.time_slots && page.time_slots[0]) || {};
          const link = `https://pickourdate.co?id=${page.slug}`;
          const status = page.status || 'pending';

          return `
            <div class="date-card">
              <div class="star" style="top:15%;left:8%;animation-delay:0s"></div>
              <div class="star" style="top:25%;left:88%;animation-delay:0.6s"></div>
              <div class="card-top">
                <div class="guest-name">${page.guest_name}</div>
                <span class="status-badge ${status}">${status}</span>
              </div>
              <div class="card-details">
                ${venue.name ? `<div class="detail-row">📍 <strong>${venue.name}</strong>${venue.tag ? ` · ${venue.tag}` : ''}</div>` : ''}
                ${slot.date ? `<div class="detail-row">📅 <strong>${slot.day}, ${slot.date}</strong> at ${slot.time}</div>` : ''}
                <div class="detail-row">🔗 <span style="word-break:break-all;font-size:12px">${link}</span></div>
              </div>
              <div class="card-actions">
                <button class="card-btn" onclick="copyLink('${link}', this)">Copy link</button>
                <button class="card-btn">${page.viewed_at ? 'Viewed ✓' : 'Not opened yet'}</button>
              </div>
            </div>
          `;
        }).join('');

      } catch (err) {
        console.error(err);
        document.getElementById('pages-list').innerHTML = '<div class="loading">Could not load dates.</div>';
      }
    }

    function copyLink(link, btn) {
      navigator.clipboard.writeText(link);
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy link'; btn.classList.remove('copied'); }, 2000);
    }

    db.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_IN' && session) {
        showDashboard(session);
      }
    });

    init();
  </script>
</body>
</html>
