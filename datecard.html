<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>It's a Date!</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; overflow-x: hidden; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #E8E0D5;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      touch-action: pan-y;
    }

    .card {
      background: #12121C;
      border-radius: 28px;
      padding: 48px 32px;
      max-width: 460px;
      width: 100%;
      text-align: center;
      position: relative;
      overflow: hidden;
      animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.9); }
      100% { opacity: 1; transform: scale(1); }
    }

    .glow {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(80,60,200,0.12) 0%, transparent 70%);
      top: -150px;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
    }

    .stars {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      border-radius: 28px;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      opacity: 0;
      animation: twinkle 3s infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 0.5; transform: scale(1.2); }
    }

    .confirmed-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(100,220,150,0.7);
      border: 1px solid rgba(100,220,150,0.2);
      padding: 5px 16px;
      border-radius: 50px;
      margin-bottom: 28px;
      position: relative;
      z-index: 1;
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(40px, 10vw, 56px);
      font-weight: 400;
      color: white;
      margin-bottom: 8px;
      position: relative;
      z-index: 1;
      line-height: 1.1;
    }

    .card-title em {
      font-style: italic;
      color: rgba(255,255,255,0.4);
    }

    .card-sub {
      font-size: 13px;
      color: rgba(255,255,255,0.25);
      font-weight: 300;
      margin-bottom: 36px;
      position: relative;
      z-index: 1;
    }

    .summary {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 8px 0;
      margin-bottom: 28px;
      text-align: left;
      position: relative;
      z-index: 1;
    }

    .summary-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .summary-row:last-child { border-bottom: none; }

    .summary-icon {
      font-size: 18px;
      width: 32px;
      text-align: center;
      flex-shrink: 0;
    }

    .summary-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.2);
      font-weight: 500;
      margin-bottom: 3px;
    }

    .summary-value {
      font-size: 15px;
      font-weight: 400;
      color: white;
      font-family: 'Playfair Display', serif;
    }

    .summary-tag {
      display: inline-block;
      font-size: 10px;
      padding: 2px 10px;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.4);
      margin-left: 8px;
      font-family: 'DM Sans', sans-serif;
      vertical-align: middle;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
      z-index: 1;
    }

    .action-btn {
      width: 100%;
      padding: 15px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.08em;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
      text-transform: uppercase;
    }

    .btn-primary {
      background: transparent;
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
    }

    .btn-primary:hover {
      border-color: rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.05);
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: transparent;
      color: rgba(255,255,255,0.35);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .btn-secondary:hover {
      border-color: rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.6);
      transform: translateY(-2px);
    }

    .card-footer {
      margin-top: 32px;
      font-size: 10px;
      color: rgba(255,255,255,0.1);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="glow"></div>
    <div class="stars">
      <div class="star" style="top:8%;left:7%;animation-delay:0s"></div>
      <div class="star" style="top:15%;left:92%;animation-delay:0.7s"></div>
      <div class="star" style="top:55%;left:4%;animation-delay:1.3s"></div>
      <div class="star" style="top:75%;left:88%;animation-delay:0.4s"></div>
      <div class="star" style="top:40%;left:96%;animation-delay:1.9s"></div>
      <div class="star" style="top:90%;left:35%;animation-delay:1.0s"></div>
      <div class="star" style="top:25%;left:50%;animation-delay:2.2s"></div>
    </div>

    <div class="confirmed-badge">✓ Confirmed</div>

    <h1 class="card-title">It's a <em>date.</em></h1>
    <p class="card-sub" id="subtitle">Can't wait. See you then.</p>

    <div class="summary">
      <div class="summary-row">
        <div class="summary-icon">📍</div>
        <div>
          <div class="summary-label">Spot</div>
          <div class="summary-value" id="summary-venue">—</div>
        </div>
      </div>
      <div class="summary-row">
        <div class="summary-icon">📅</div>
        <div>
          <div class="summary-label">Date</div>
          <div class="summary-value" id="summary-date">—</div>
        </div>
      </div>
      <div class="summary-row">
        <div class="summary-icon">🕖</div>
        <div>
          <div class="summary-label">Time</div>
          <div class="summary-value" id="summary-time">—</div>
        </div>
      </div>
    </div>

    <div class="actions">
      <a class="action-btn btn-primary" id="maps-btn" href="https://maps.google.com" target="_blank">
        Open in Google Maps
      </a>
      <button class="action-btn btn-secondary" onclick="addToCalendar()">
        Add to calendar
      </button>
      <button class="action-btn btn-secondary" onclick="shareWithFriend()">
        Share with a friend
      </button>
      <button class="action-btn btn-secondary" onclick="window.location.href='creator.html'">
        Create your own date page
      </button>
    </div>

    <p class="card-footer">pickourdate.co</p>
  </div>

  <script src="supabase.js"></script>
  <script>
    const venue = JSON.parse(localStorage.getItem('venue') || '{}');
    const slot = JSON.parse(localStorage.getItem('slot') || '{}');
    const slug = localStorage.getItem('slug');

    async function loadPage() {
      let v = venue;
      let s = slot;

      if (slug && (!v.name || !s.date)) {
        try {
          const page = await getDatePage(slug);
          if (page) {
            v = page.selected_venue || v;
            s = page.selected_slot || s;
            if (page.guest_name) {
              document.getElementById('subtitle').textContent =
                `Can't wait, ${page.guest_name}. See you then.`;
            }
          }
        } catch (err) { console.error(err); }
      }

      if (v.name) {
        document.getElementById('summary-venue').innerHTML =
          `${v.name} <span class="summary-tag">${v.tag}</span>`;
        document.getElementById('maps-btn').href = v.maps || 'https://maps.google.com';
      }

      if (s.date) {
        document.getElementById('summary-date').textContent = `${s.day}, ${s.date}`;
        document.getElementById('summary-time').textContent = s.time;
      }
    }

    function addToCalendar() {
      const venueName = venue.name || 'Our Date';
      const address = venue.address || '';
      const text = encodeURIComponent(`Date at ${venueName}`);
      const location = encodeURIComponent(address);
      window.open(
        `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${text}&location=${location}`,
        '_blank'
      );
    }

    function shareWithFriend() {
      const text = `${venue.name || 'Our date'} — ${slot.day || ''} ${slot.date || ''} at ${slot.time || ''}`;
      if (navigator.share) {
        navigator.share({ title: "It's a date!", text, url: window.location.href });
      } else {
        navigator.clipboard.writeText(window.location.href);
        alert('Link copied to clipboard!');
      }
    }

    loadPage();
  </script>
</body>
</html>
