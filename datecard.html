<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>It's a Date!</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=DM+Sans:wght@400;500;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #0f1c3f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      position: relative;
    }

    .bg-glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(58,123,213,0.25) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 28px;
      padding: 44px 40px;
      max-width: 500px;
      width: 100%;
      text-align: center;
      position: relative;
    }

    .confirmed-badge {
      display: inline-block;
      background: rgba(58,213,130,0.15);
      color: #5be8a0;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 50px;
      border: 1px solid rgba(91,232,160,0.3);
      margin-bottom: 24px;
    }

    .header h1 {
      font-family: 'Dancing Script', cursive;
      font-size: 52px;
      color: white;
      margin-bottom: 8px;
    }

    .header p {
      font-size: 15px;
      color: rgba(255,255,255,0.45);
      margin-bottom: 36px;
    }

    .summary {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 28px;
      text-align: left;
    }

    .summary-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .summary-row:last-child { border-bottom: none; }

    .summary-icon {
      font-size: 20px;
      width: 36px;
      text-align: center;
      flex-shrink: 0;
    }

    .summary-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.35);
      font-weight: 600;
      margin-bottom: 2px;
    }

    .summary-value {
      font-size: 16px;
      font-weight: 700;
      color: white;
    }

    .summary-tag {
      display: inline-block;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 50px;
      background: rgba(58,123,213,0.3);
      color: #7ab3f5;
      border: 1px solid rgba(91,156,246,0.3);
      margin-left: 8px;
      font-weight: 500;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .action-btn {
      width: 100%;
      padding: 15px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
    }

    .btn-primary {
      background: #3a7bd5;
      color: white;
      border: none;
    }

    .btn-primary:hover {
      background: #2d66bb;
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: transparent;
      color: white;
      border: 1px solid rgba(255,255,255,0.15);
    }

    .btn-secondary:hover {
      border-color: rgba(255,255,255,0.35);
      transform: translateY(-2px);
    }

    .footer {
      margin-top: 32px;
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    @keyframes pop {
      0% { transform: scale(0.8); opacity: 0; }
      70% { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }

    .card { animation: pop 0.4s ease forwards; }
  </style>
</head>
<body>
  <div class="bg-glow"></div>

  <div class="card">
    <div class="confirmed-badge">✓ Confirmed</div>

    <div class="header">
      <h1>It's a date!</h1>
      <p>Can't wait, Sara. See you then.</p>
    </div>

    <div class="summary">
      <div class="summary-row">
        <div class="summary-icon">📍</div>
        <div>
          <div class="summary-label">Spot</div>
          <div class="summary-value">Amor Cubano <span class="summary-tag">Dinner</span></div>
        </div>
      </div>
      <div class="summary-row">
        <div class="summary-icon">📅</div>
        <div>
          <div class="summary-label">Date</div>
          <div class="summary-value">Saturday, June 7</div>
        </div>
      </div>
      <div class="summary-row">
        <div class="summary-icon">🕖</div>
        <div>
          <div class="summary-label">Time</div>
          <div class="summary-value">7:00 PM</div>
        </div>
      </div>
    </div>

    <div class="actions">
      <a class="action-btn btn-primary" href="https://maps.google.com" target="_blank">
        🗺️ Open in Google Maps
      </a>
      <button class="action-btn btn-secondary" onclick="addToCalendar()">
        📅 Add to calendar
      </button>
      <button class="action-btn btn-secondary" onclick="shareWithFriend()">
        🔗 Share with a friend
      </button>
    </div>

    <p class="footer">pickourdate.co</p>
  </div>

  <script>
    function addToCalendar() {
      const text = encodeURIComponent("Date at Amor Cubano");
      const dates = "20250607T190000/20250607T220000";
      const location = encodeURIComponent("140 E 46th St, New York, NY");
      window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${text}&dates=${dates}&location=${location}`, '_blank');
    }

    function shareWithFriend() {
      if (navigator.share) {
        navigator.share({
          title: "It's a date!",
          text: "Amor Cubano — Saturday June 7 at 7pm",
          url: window.location.href
        });
      } else {
        navigator.clipboard.writeText(window.location.href);
        alert("Link copied to clipboard!");
      }
    }
  const venue = JSON.parse(localStorage.getItem('venue') || '{}');
    const slot = JSON.parse(localStorage.getItem('slot') || '{}');

    if (venue.name) {
      document.querySelector('.summary-row:nth-child(1) .summary-value').innerHTML =
        `${venue.name} <span class="summary-tag">${venue.tag}</span>`;
    }
    if (slot.date) {
      document.querySelector('.summary-row:nth-child(2) .summary-value').textContent =
        `${slot.day}, ${slot.date}`;
      document.querySelector('.summary-row:nth-child(3) .summary-value').textContent =
        slot.time;
    }

    if (venue.maps) {
      document.querySelector('.btn-primary').href = venue.maps;
    }</script>
</body>
</html>
