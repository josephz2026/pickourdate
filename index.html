<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pick Our Date</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow-x: hidden; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #E8E0D5;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #12121C;
      border-radius: 32px;
      padding: 56px 40px;
      max-width: 460px;
      width: 100%;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .glow {
      position: absolute;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(80,60,200,0.12) 0%, transparent 70%);
      top: -150px; left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
    }
    .stars { position: absolute; inset: 0; pointer-events: none; overflow: hidden; border-radius: 32px; }
    .star { position: absolute; width: 2px; height: 2px; background: white; border-radius: 50%; opacity: 0; animation: twinkle 3s infinite; }
    @keyframes twinkle { 0%, 100% { opacity: 0; transform: scale(0.5); } 50% { opacity: 0.5; transform: scale(1.2); } }
    .hero-text { font-family: 'Playfair Display', serif; font-size: clamp(42px, 10vw, 58px); font-weight: 400; line-height: 1.1; color: white; margin-bottom: 20px; position: relative; z-index: 1; }
    .hero-text em { font-style: italic; color: rgba(255,255,255,0.4); }
    .hero-sub { font-size: 16px; color: rgba(255,255,255,0.9); line-height: 1.8; margin-bottom: 52px; position: relative; z-index: 1; }
    .ghost-btn { display: inline-block; background: transparent; color: white; padding: 15px 40px; border-radius: 50px; font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; border: 1px solid rgba(255,255,255,0.3); font-family: 'DM Sans', sans-serif; transition: all 0.3s; position: relative; z-index: 1; width: 100%; }
    .ghost-btn:hover { border-color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.05); }
    .card-footer { margin-top: 36px; font-size: 10px; color: rgba(255,255,255,0.5); letter-spacing: 0.15em; text-transform: uppercase; position: relative; z-index: 1; }
    .date-label { font-size: 11px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.45); margin-bottom: 40px; position: relative; z-index: 1; }
    .date-hero { font-family: 'Playfair Display', serif; font-size: clamp(44px, 11vw, 60px); font-weight: 400; line-height: 1.1; color: white; margin-bottom: 16px; position: relative; z-index: 1; }
    .date-hero .name { font-style: italic; color: rgba(255,255,255,0.45); display: block; }
    .date-note { font-size: 16px; color: rgba(255,255,255,1.0); line-height: 1.8; margin-bottom: 48px; font-style: italic; position: relative; z-index: 1; }
    .loading-dot { display: inline-block; width: 4px; height: 4px; border-radius: 50%; background: rgba(255,255,255,0.3); animation: pulse 1.4s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    .error-text { font-size: 14px; color: rgba(255,100,100,0.5); position: relative; z-index: 1; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .fade-up { animation: fadeUp 0.7s ease forwards; }
    .hidden { display: none; }
    @keyframes popIn { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }
    .pop-in { animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    .confirmed-badge { display: inline-block; font-size: 11px; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(100,220,150,0.9); border: 1px solid rgba(100,220,150,0.3); padding: 6px 18px; border-radius: 50px; margin-bottom: 28px; position: relative; z-index: 1; }
    .summary { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 8px 0; margin-bottom: 28px; text-align: left; position: relative; z-index: 1; }
    .summary-row { display: flex; align-items: center; gap: 14px; padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.07); }
    .summary-row:last-child { border-bottom: none; }
    .summary-icon { font-size: 20px; width: 32px; text-align: center; flex-shrink: 0; }
    .summary-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: rgba(255,255,255,0.4); font-weight: 500; margin-bottom: 4px; }
    .summary-value { font-size: 17px; font-weight: 500; color: white; }
    .summary-tag { display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.6); margin-left: 8px; font-family: 'DM Sans', sans-serif; vertical-align: middle; }
    .actions { display: flex; flex-direction: column; gap: 10px; position: relative; z-index: 1; }
    .action-btn { width: 100%; padding: 16px; border-radius: 50px; font-size: 14px; font-weight: 500; letter-spacing: 0.06em; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; text-transform: uppercase; color: white; background: transparent; border: 1px solid rgba(255,255,255,0.3); }
    .action-btn:hover { border-color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.07); transform: translateY(-2px); }
  </style>
</head>
<body>

  <!-- Landing -->
  <div class="card" id="landing">
    <div class="glow"></div>
    <div class="stars">
      <div class="star" style="top:8%;left:7%;animation-delay:0s"></div>
      <div class="star" style="top:15%;left:92%;animation-delay:0.7s"></div>
      <div class="star" style="top:55%;left:4%;animation-delay:1.3s"></div>
      <div class="star" style="top:75%;left:88%;animation-delay:0.4s"></div>
      <div class="star" style="top:40%;left:96%;animation-delay:1.9s"></div>
      <div class="star" style="top:90%;left:35%;animation-delay:1.0s"></div>
      <div class="star" style="top:25%;left:50%;animation-delay:2.2s"></div>
    </div>
    <a href="/dashboard" style="position:absolute;top:24px;right:24px;font-size:13px;color:rgba(255,255,255,0.4);text-decoration:none;letter-spacing:0.05em;z-index:10;">My dates →</a>
    <h1 class="hero-text">Make the<br><em>move.</em></h1>
    <p class="hero-sub">The effort is yours.<br>The choice is hers.</p>
    <button class="ghost-btn" onclick="window.location.href='/creator'">Create a date plan</button>
    <p class="card-footer">pickourdate.co</p>
    <div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px;position:relative;z-index:1;">
      <a href="https://instagram.com/pickourdate.co" target="_blank" style="color:rgba(255,255,255,0.5);text-decoration:none;font-size:11px;letter-spacing:0.08em;transition:color 0.2s;" onmouseover="this.style.color='rgba(255,255,255,0.7)'" onmouseout="this.style.color='rgba(255,255,255,0.3)'">Instagram</a>
      <span style="color:rgba(255,255,255,0.15)">·</span>
      <a href="https://tiktok.com/@pickourdate" target="_blank" style="color:rgba(255,255,255,0.5);text-decoration:none;font-size:11px;letter-spacing:0.08em;transition:color 0.2s;" onmouseover="this.style.color='rgba(255,255,255,0.7)'" onmouseout="this.style.color='rgba(255,255,255,0.3)'">TikTok</a>
      <span style="color:rgba(255,255,255,0.15)">·</span>
      <a href="https://forms.gle/TdhTrhVPsmhAr7aR7" style="color:rgba(255,255,255,0.5);text-decoration:none;font-size:11px;letter-spacing:0.08em;transition:color 0.2s;" onmouseover="this.style.color='rgba(255,255,255,0.7)'" onmouseout="this.style.color='rgba(255,255,255,0.3)'">Contact</a>
    </div>
  </div>

  <!-- Date proposal -->
  <div class="card hidden" id="date-page">
    <div class="glow"></div>
    <div class="stars">
      <div class="star" style="top:8%;left:7%;animation-delay:0s"></div>
      <div class="star" style="top:15%;left:92%;animation-delay:0.7s"></div>
      <div class="star" style="top:55%;left:4%;animation-delay:1.3s"></div>
      <div class="star" style="top:75%;left:88%;animation-delay:0.4s"></div>
      <div class="star" style="top:40%;left:96%;animation-delay:1.9s"></div>
      <div class="star" style="top:90%;left:35%;animation-delay:1.0s"></div>
      <div class="star" style="top:25%;left:50%;animation-delay:2.2s"></div>
    </div>
    <div id="date-inner"><div class="loading-dot"></div></div>
  </div>

  <!-- Confirmed datecard -->
  <div class="card hidden pop-in" id="datecard-page">
    <div class="glow"></div>
    <div class="stars">
      <div class="star" style="top:8%;left:7%;animation-delay:0s"></div>
      <div class="star" style="top:15%;left:92%;animation-delay:0.7s"></div>
      <div class="star" style="top:55%;left:4%;animation-delay:1.3s"></div>
      <div class="star" style="top:75%;left:88%;animation-delay:0.4s"></div>
      <div class="star" style="top:40%;left:96%;animation-delay:1.9s"></div>
      <div class="star" style="top:90%;left:35%;animation-delay:1.0s"></div>
      <div class="star" style="top:25%;left:50%;animation-delay:2.2s"></div>
    </div>
    <div class="confirmed-badge">✓ Confirmed</div>
    <h1 class="date-hero" style="font-size:clamp(44px,11vw,58px);margin-bottom:8px">It's a <em style="font-style:italic;color:rgba(255,255,255,0.45)">date.</em></h1>
    <p style="font-size:15px;color:rgba(255,255,255,0.5);font-weight:300;margin-bottom:36px;position:relative;z-index:1" id="datecard-subtitle">Can't wait. See you then.</p>
    <div class="summary">
      <div class="summary-row">
        <div class="summary-icon">📍</div>
        <div>
          <div class="summary-label">Spot</div>
          <div class="summary-value" id="dc-venue">—</div>
        </div>
      </div>
      <div class="summary-row">
        <div class="summary-icon">📅</div>
        <div>
          <div class="summary-label">Date</div>
          <div class="summary-value" id="dc-date">—</div>
        </div>
      </div>
      <div class="summary-row">
        <div class="summary-icon">🕖</div>
        <div>
          <div class="summary-label">Time</div>
          <div class="summary-value" id="dc-time">—</div>
        </div>
      </div>
    </div>
    <div class="actions">
      <a class="action-btn" id="dc-maps-btn" href="https://maps.google.com" target="_blank">Open in Google Maps</a>
      <button class="action-btn" onclick="addToGoogleCalendar()">Add to Google Calendar</button>
      <button class="action-btn" onclick="addToAppleCalendar()">Add to Apple Calendar</button>
      <button class="action-btn" onclick="shareWithFriend()">Share with a friend</button>
      <button class="action-btn" onclick="window.location.href='/creator'">Create your own date page</button>
    </div>
    <p class="card-footer">pickourdate.co</p>
  </div>

  <script src="supabase.js"></script>
  <script>
    var venue = {};
    var slot = {};

    async function init() {
      var rawPath = window.location.pathname;
      var slug = rawPath.replace(/^\//, '');

      if (!slug) {
        document.getElementById('landing').classList.remove('hidden');
        return;
      }

      document.getElementById('landing').classList.add('hidden');
      document.getElementById('date-page').classList.remove('hidden');

      try {
        var page = await getDatePage(slug);

        if (!page) {
          document.getElementById('date-inner').innerHTML =
            '<p class="date-label">pickourdate.co</p>' +
            '<h1 class="date-hero">Not found.</h1>' +
            '<p class="error-text">This link is invalid or has expired.</p>';
          return;
        }

        localStorage.setItem('slug', slug);

        // Only notify on first view, not repeat views
        if (!page.viewed_at) {
          updateDatePage(slug, { viewed_at: new Date().toISOString() });
          if (page.notify_email && page.notify_on_view !== false) {
            fetch('/api/notify', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ to: page.notify_email, guestName: page.guest_name, type: 'viewed' })
            });
          }
        }

        if (page.status === 'confirmed') {
          document.getElementById('date-page').classList.add('hidden');
          document.getElementById('datecard-page').classList.remove('hidden');

          if (page.selected_venue) {
            venue = typeof page.selected_venue === 'string'
              ? JSON.parse(page.selected_venue) : page.selected_venue;
          }
          if (page.selected_slot) {
            slot = typeof page.selected_slot === 'string'
              ? JSON.parse(page.selected_slot) : page.selected_slot;
          }

          if (page.guest_name) {
            document.getElementById('datecard-subtitle').textContent =
              'Can\'t wait, ' + page.guest_name + '. See you then.';
          }

         if (venue.name) {
            var mapsUrl = venue.address 
              ? 'https://www.google.com/maps/search/' + encodeURIComponent(venue.name + ' ' + venue.address)
              : (venue.maps || 'https://maps.google.com');
            document.getElementById('dc-venue').innerHTML =
              '<a href="' + mapsUrl + '" target="_blank" style="color:white;text-decoration:underline">' + venue.name + '</a>' +
              ' <span class="summary-tag">' + (venue.tag || '') + '</span>' +
              (venue.address ? '<div style="font-size:12px;color:rgba(255,255,255,0.4);margin-top:4px">' + venue.address + '</div>' : '') +
              (venue.rating ? '<div style="font-size:12px;color:rgba(255,255,255,0.4);margin-top:2px">' + venue.rating + '★' + (venue.reviews ? ' · ' + venue.reviews + ' reviews' : '') + '</div>' : '');
            document.getElementById('dc-maps-btn').href = mapsUrl;
          }
          if (slot.date) {
            document.getElementById('dc-date').textContent = slot.day + ', ' + slot.date;
            document.getElementById('dc-time').textContent = slot.time;
          }
          return;
        }

        var note = page.personal_note
          ? '<p class="date-note">"' + page.personal_note + '"</p>'
          : '<div style="margin-bottom:48px"></div>';

        var senderLine = page.sender_name
          ? '<p class="date-label">a date planned by ' + page.sender_name + '</p>'
          : '<p class="date-label">you have a date proposal</p>';

        document.getElementById('date-inner').innerHTML =
          senderLine +
          '<h1 class="date-hero fade-up">Hey, <span class="name">' + page.guest_name + '.</span></h1>' +
          note +
          '<button class="ghost-btn fade-up" onclick="window.location.href=\'venues.html\'">See the options</button>' +
          '<p class="card-footer" style="margin-top:36px">pickourdate.co</p>';

      } catch (err) {
        console.error(err);
        document.getElementById('date-inner').innerHTML =
          '<p class="date-label">pickourdate.co</p>' +
          '<h1 class="date-hero">Hmm.</h1>' +
          '<p class="error-text">Something went wrong. Try again.</p>';
      }
    }

    function parseSlotToDate() {
      try {
        var dateStr = slot.date || '';
        var timeStr = slot.time || '12:00 PM';
        var year = new Date().getFullYear();
        var d = new Date(dateStr + ' ' + year + ' ' + timeStr);
        if (isNaN(d)) return null;
        return d;
      } catch(e) { return null; }
    }

    function toICSDate(d) {
      return d.toISOString().replace(/[-:]/g,'').split('.')[0] + 'Z';
    }

    function addToGoogleCalendar() {
      var venueName = venue.name || 'Our Date';
      var address = venue.address || '';
      var start = parseSlotToDate();
      var end = start ? new Date(start.getTime() + 7200000) : null;
      var url = 'https://calendar.google.com/calendar/render?action=TEMPLATE' +
        '&text=' + encodeURIComponent('Date at ' + venueName) +
        '&location=' + encodeURIComponent(address);
      if (start && !isNaN(start)) {
        url += '&dates=' + toICSDate(start) + '/' + toICSDate(end);
      }
      var a = document.createElement('a');
      a.href = url;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    function addToAppleCalendar() {
      var venueName = venue.name || 'Our Date';
      var address = venue.address || '';
      var start = parseSlotToDate() || new Date();
      var end = new Date(start.getTime() + 7200000);
      var ics = 'BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//pickourdate//EN\r\nBEGIN:VEVENT\r\n' +
        'SUMMARY:Date at ' + venueName + '\r\n' +
        'LOCATION:' + address + '\r\n' +
        'DTSTART:' + toICSDate(start) + '\r\n' +
        'DTEND:' + toICSDate(end) + '\r\n' +
        'DESCRIPTION:Your date at ' + venueName + '\r\n' +
        'END:VEVENT\r\nEND:VCALENDAR';
      var blob = new Blob([ics], {type:'text/calendar;charset=utf-8'});
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.setAttribute('download', 'date.ics');
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
    }

    function shareWithFriend() {
      var text = (venue.name || 'Our date') + ' — ' + (slot.day || '') + ' ' + (slot.date || '') + ' at ' + (slot.time || '');
      if (navigator.share) {
        navigator.share({ title: "It's a date!", text: text, url: window.location.href });
      } else {
        navigator.clipboard.writeText(window.location.href);
        alert('Link copied to clipboard!');
      }
    }

    init();
  </script>
</body>
</html>
