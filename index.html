<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pick Our Date</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow-x: hidden; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #E8E0D5;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ── SHARED CARD ── */
    .card {
      background: #12121C;
      border-radius: 32px;
      padding: 56px 40px;
      max-width: 460px;
      width: 100%;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .glow {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(80,60,200,0.12) 0%, transparent 70%);
      top: -150px;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
    }

    .stars {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      border-radius: 32px;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      opacity: 0;
      animation: twinkle 3s infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 0.5; transform: scale(1.2); }
    }

    /* ── TYPOGRAPHY ── */
    .wordmark {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 48px;
      position: relative;
      z-index: 1;
    }

    .hero-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(42px, 10vw, 58px);
      font-weight: 400;
      line-height: 1.1;
      color: white;
      margin-bottom: 20px;
      position: relative;
      z-index: 1;
    }

    .hero-text em {
      font-style: italic;
      color: rgba(255,255,255,0.4);
    }

    .hero-sub {
      font-size: 16px;
      font-weight: 400;
      color: rgba(255,255,255,0.9);
      line-height: 1.8;
      margin-bottom: 52px;
      position: relative;
      z-index: 1;
    }

    /* ── BUTTONS ── */
    .ghost-btn {
      display: inline-block;
      background: transparent;
      color: white;
      padding: 15px 40px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.3);
      font-family: 'DM Sans', sans-serif;
      transition: all 0.3s;
      position: relative;
      z-index: 1;
      width: 100%;
    }

    .ghost-btn:hover {
      border-color: rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.05);
    }

    /* ── FOOTER ── */
    .card-footer {
      margin-top: 36px;
      font-size: 10px;
      color: rgba(255,255,255,0.1);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      position: relative;
      z-index: 1;
    }

    /* ── DATE PAGE LABEL ── */
   .date-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      margin-bottom: 40px;
      position: relative;
      z-index: 1;
    }

    .date-hero {
      font-family: 'Playfair Display', serif;
      font-size: clamp(44px, 11vw, 60px);
      font-weight: 400;
      line-height: 1.1;
      color: white;
      margin-bottom: 16px;
      position: relative;
      z-index: 1;
    }

    .date-hero .name {
      font-style: italic;
      color: rgba(255,255,255,0.45);
      display: block;
    }

    .date-note {
      font-size: 16px;
      font-weight: 400;
      color: rgba(255,255,255,1.0);
      line-height: 1.8;
      margin-bottom: 48px;
      font-style: italic;
      position: relative;
      z-index: 1;
    }
    

    /* ── LOADING ── */
    .loading-dot {
      display: inline-block;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      animation: pulse 1.4s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    .error-text {
      font-size: 14px;
      color: rgba(255,100,100,0.5);
      position: relative;
      z-index: 1;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fade-up { animation: fadeUp 0.7s ease forwards; }

    /* ── HIDDEN ── */
    .hidden { display: none; }
  </style>
</head>
<body>

  <!-- Landing page -->
  <div class="card" id="landing">
    <div class="glow"></div>
    <div class="stars">
      <div class="star" style="top:8%;left:7%;animation-delay:0s"></div>
      <div class="star" style="top:15%;left:92%;animation-delay:0.7s"></div>
      <div class="star" style="top:55%;left:4%;animation-delay:1.3s"></div>
      <div class="star" style="top:75%;left:88%;animation-delay:0.4s"></div>
      <div class="star" style="top:40%;left:96%;animation-delay:1.9s"></div>
      <div class="star" style="top:90%;left:35%;animation-delay:1.0s"></div>
      <div class="star" style="top:25%;left:50%;animation-delay:2.2s"></div>
    </div>
    
    <h1 class="hero-text">Make the<br><em>move.</em></h1>
    <p class="hero-sub">The effort is yours.<br>The choice is hers.</p>
    <a href="/dashboard" style="position:absolute;top:24px;right:24px;font-size:13px;color:rgba(255,255,255,0.4);text-decoration:none;letter-spacing:0.05em;z-index:10;" >My dates →</a>
    <button class="ghost-btn" onclick="window.location.href='creator.html'">
      Create a date plan
    </button>
    <p class="card-footer">pickourdate.co</p>
  </div>

  <!-- Date page -->
  <div class="card hidden" id="date-page">
    <div class="glow"></div>
    <div class="stars">
      <div class="star" style="top:8%;left:7%;animation-delay:0s"></div>
      <div class="star" style="top:15%;left:92%;animation-delay:0.7s"></div>
      <div class="star" style="top:55%;left:4%;animation-delay:1.3s"></div>
      <div class="star" style="top:75%;left:88%;animation-delay:0.4s"></div>
      <div class="star" style="top:40%;left:96%;animation-delay:1.9s"></div>
      <div class="star" style="top:90%;left:35%;animation-delay:1.0s"></div>
      <div class="star" style="top:25%;left:50%;animation-delay:2.2s"></div>
    </div>
    <div id="date-inner">
      <div class="loading-dot"></div>
    </div>
  </div>

  <script src="supabase.js"></script>
  <script>
    async function init() {
      const params = new URLSearchParams(window.location.search);
const rawPath = window.location.pathname;
const slug = rawPath.replace(/^\//, '') || params.get('id');
console.log('path:', rawPath, 'slug:', slug);
      if (!slug) {
        document.getElementById('landing').classList.remove('hidden');
        return;
      }

      document.getElementById('landing').classList.add('hidden');
      document.getElementById('date-page').classList.remove('hidden');

      try {
        const page = await getDatePage(slug);

        if (!page) {
          document.getElementById('date-inner').innerHTML = `
            <p class="date-label">pickourdate.co</p>
            <h1 class="date-hero">Not found.</h1>
            <p class="error-text">This link is invalid or has expired.</p>
          `;
          return;
        }

        localStorage.setItem('slug', slug);
        localStorage.setItem('dateMode', page.date_mode);

       await updateDatePage(slug, { viewed_at: new Date().toISOString() });

        if (page.notify_email) {
          fetch('/api/notify', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              to: page.notify_email,
              guestName: page.guest_name,
              type: 'viewed'
            })
          });
        }

        const note = page.personal_note
          ? `<p class="date-note">"${page.personal_note}"</p>`
          : '<div style="margin-bottom:48px"></div>';

        if (page.status === 'confirmed') {
            window.location.href = 'datecard.html';
            return;
          }

          document.getElementById('date-inner').innerHTML = `
          <p class="date-label">you have a date proposal</p>
          <h1 class="date-hero fade-up">
            Hey,
            <span class="name">${page.guest_name}.</span>
          </h1>
          ${note}
          <button class="ghost-btn fade-up" onclick="window.location.href='venues.html'">
            See the options
          </button>
          <p class="card-footer" style="margin-top:36px">pickourdate.co</p>
        `;

      } catch (err) {
        document.getElementById('date-inner').innerHTML = `
          <p class="date-label">pickourdate.co</p>
          <h1 class="date-hero">Hmm.</h1>
          <p class="error-text">Something went wrong. Try again.</p>
        `;
      }
    }

    init();
  </script>
</body>
</html>
