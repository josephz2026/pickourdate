<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pick Our Date</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=DM+Sans:wght@400;500;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #0f1c3f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
      position: relative;
    }

    .bg-glow {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(58,123,213,0.25) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .card {
      background: rgba(255,255,255,0.04);
      border-radius: 28px;
      padding: 52px 44px;
      max-width: 500px;
      width: 100%;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.1);
      position: relative;
      backdrop-filter: blur(10px);
    }

    .tag {
      display: inline-block;
      background: rgba(58,123,213,0.2);
      color: #7ab3f5;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 50px;
      border: 1px solid rgba(122,179,245,0.3);
      margin-bottom: 32px;
    }

    h1 {
      font-family: 'Dancing Script', cursive;
      font-size: 64px;
      font-weight: 700;
      color: white;
      line-height: 1.2;
      margin-bottom: 16px;
    }

    h1 .name {
      color: #5b9cf6;
      display: block;
    }

    .subtitle {
      font-family: 'DM Sans', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: white;
      margin-bottom: 16px;
      letter-spacing: -0.5px;
    }

    .note {
      font-size: 15px;
      color: rgba(255,255,255,0.45);
      line-height: 1.6;
      margin-bottom: 44px;
      font-style: italic;
    }

    .btn {
      display: inline-block;
      background: #3a7bd5;
      color: white;
      padding: 18px 48px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      font-family: 'DM Sans', sans-serif;
      letter-spacing: 0.02em;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .btn:hover { background: #2d66bb; transform: translateY(-2px); }
    .btn:active { transform: translateY(0); }

    .stars {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0; left: 0;
      pointer-events: none;
      overflow: hidden;
      border-radius: 28px;
    }

    .star {
      position: absolute;
      width: 3px;
      height: 3px;
      background: white;
      border-radius: 50%;
      opacity: 0;
      animation: twinkle 3s infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 0.6; transform: scale(1.2); }
    }

    .footer {
      margin-top: 36px;
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="card">
    <div class="stars">
      <div class="star" style="top:15%;left:10%;animation-delay:0s"></div>
      <div class="star" style="top:25%;left:85%;animation-delay:0.5s"></div>
      <div class="star" style="top:70%;left:20%;animation-delay:1s"></div>
      <div class="star" style="top:80%;left:75%;animation-delay:1.5s"></div>
      <div class="star" style="top:45%;left:92%;animation-delay:0.8s"></div>
      <div class="star" style="top:10%;left:60%;animation-delay:2s"></div>
      <div class="star" style="top:90%;left:45%;animation-delay:0.3s"></div>
    </div>
    <div class="tag">✦ You have a date proposal</div>
    <h1>Hey, <span class="name">Sara.</span></h1>
    <p class="subtitle">Pick our date.</p>
    <p class="note">"Thought you should have a say in this one."</p>
    <button class="btn" onclick="window.location.href='venues.html'">
      Let's see the options
    </button>
    <p class="footer">pickourdate.co</p>
  </div>
</body>
</html>
